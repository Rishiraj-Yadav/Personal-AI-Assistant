services:
  backend:
    build: ./backend
    container_name: sonarbot-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - E2B_API_KEY=${E2B_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - DEBUG=${DEBUG:-false}
      - DESKTOP_AGENT_URL=http://host.docker.internal:7777
      - DESKTOP_AGENT_API_KEY=${DESKTOP_AGENT_API_KEY:-}
      # ✅ CRITICAL FIX: Qdrant URL (use service name 'qdrant', NOT 'localhost'!)
      - QDRANT_URL=http://qdrant:6333
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DASHBOARD_BASE_URL=${DASHBOARD_BASE_URL:-http://localhost:8000}
      - VIRTUAL_DESKTOP_TIMEOUT=${VIRTUAL_DESKTOP_TIMEOUT:-600}
      - VIRTUAL_DESKTOP_MAX_SESSIONS=${VIRTUAL_DESKTOP_MAX_SESSIONS:-5}
      - VIRTUAL_DESKTOP_RESOLUTION=${VIRTUAL_DESKTOP_RESOLUTION:-1280x720x24}
    volumes:
      - ./backend/app:/app/app
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
      - ${WORKSPACE_PATH:-./workspace}:/workspace
      - ./desktop-agent/config/api_key.txt:/app/desktop_agent_key.txt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ✅ FIX: Add backend to same network as Qdrant
    networks:
      - sonarbot-network
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sonarbot-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - sonarbot-network
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: sonarbot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    networks:
      - sonarbot-network
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  sonarbot-network:
    driver: bridge